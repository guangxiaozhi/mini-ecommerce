#spring.application.name=mini-ecommerce-backend
spring:
    profiles:
        active: local
    datasource:
        url: jdbc:mysql://localhost:3306/mini_ecommerce?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
        username: root
        password: YOUR_DB_PASSWORD
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

server:
    port: 8080

jwt:
    secret: YOUR_JWT_SECRET
    expire-minutes: 120